<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Snake Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
    display:flex;
    flex-direction:column;
    align-items:center;
    color:white;
}

h1{
    margin-top:20px;
    color:#00ffcc;
    text-shadow:0 0 15px #00ffcc;
}

.score-box{
    margin:10px;
    font-size:20px;
}

canvas{
    border:3px solid #00ffcc;
    border-radius:15px;
    box-shadow:0 0 25px #00ffcc;
    background:#000;
}

.controls{
    margin-top:20px;
    display:grid;
    grid-template-columns:80px 80px 80px;
    gap:10px;
}

.btn{
    width:80px;
    height:80px;
    border:none;
    border-radius:15px;
    font-size:28px;
    color:white;
    cursor:pointer;
    background:linear-gradient(45deg,#06b6d4,#3b82f6);
    box-shadow:0 0 15px #3b82f6;
}

.btn:hover{
    transform:scale(1.05);
}

.restart{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 0 15px #22c55e;
}
</style>
</head>
<body>

<h1>🐍 Neon Snake</h1>

<div class="score-box">
คะแนน: <span id="score">0</span> |
สูงสุด: <span id="highscore">0</span>
</div>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
    <div></div>
    <button class="btn" onclick="setDirection('UP')">⬆</button>
    <div></div>

    <button class="btn" onclick="setDirection('LEFT')">⬅</button>
    <button class="btn" onclick="setDirection('DOWN')">⬇</button>
    <button class="btn" onclick="setDirection('RIGHT')">➡</button>
</div>

<button class="restart" onclick="restartGame()">
เริ่มใหม่
</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;
const tileCount = canvas.width / grid;

let snake = [
    {x:10,y:10}
];

let dx = 1;
let dy = 0;

let score = 0;

let highScore =
localStorage.getItem("snakeHighScore") || 0;

document.getElementById("highscore").textContent =
highScore;

let food = randomFood();

function randomFood(){
    return {
        x:Math.floor(Math.random()*tileCount),
        y:Math.floor(Math.random()*tileCount),
        color:`hsl(${Math.random()*360},100%,50%)`
    };
}

function drawGame(){

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let head = {
        x:snake[0].x + dx,
        y:snake[0].y + dy
    };

    if(
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount
    ){
        gameOver();
        return;
    }

    for(let part of snake){
        if(part.x===head.x && part.y===head.y){
            gameOver();
            return;
        }
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){

        score++;
        document.getElementById("score").textContent =
        score;

        if(score > highScore){
            highScore = score;
            localStorage.setItem(
                "snakeHighScore",
                highScore
            );

            document.getElementById(
                "highscore"
            ).textContent = highScore;
        }

        food=randomFood();

    }else{
        snake.pop();
    }

    ctx.fillStyle=food.color;
    ctx.shadowBlur=20;
    ctx.shadowColor=food.color;

    ctx.fillRect(
        food.x*grid,
        food.y*grid,
        grid,
        grid
    );

    snake.forEach((part,index)=>{

        ctx.fillStyle=
        index===0 ? "#00ffcc" : "#22c55e";

        ctx.shadowBlur=15;
        ctx.shadowColor="#00ffcc";

        ctx.fillRect(
            part.x*grid,
            part.y*grid,
            grid-2,
            grid-2
        );
    });
}

function gameOver(){
    alert("Game Over!\nคะแนน: "+score);
    restartGame();
}

function restartGame(){

    snake=[{x:10,y:10}];

    dx=1;
    dy=0;

    score=0;

    document.getElementById("score")
    .textContent=0;

    food=randomFood();
}

function setDirection(dir){

    if(dir==="UP" && dy!==1){
        dx=0; dy=-1;
    }

    if(dir==="DOWN" && dy!==-1){
        dx=0; dy=1;
    }

    if(dir==="LEFT" && dx!==1){
        dx=-1; dy=0;
    }

    if(dir==="RIGHT" && dx!==-1){
        dx=1; dy=0;
    }
}

document.addEventListener("keydown",e=>{

    if(e.key==="ArrowUp") setDirection("UP");
    if(e.key==="ArrowDown") setDirection("DOWN");
    if(e.key==="ArrowLeft") setDirection("LEFT");
    if(e.key==="ArrowRight") setDirection("RIGHT");

});

setInterval(drawGame,100);
</script>

</body>
</html>
