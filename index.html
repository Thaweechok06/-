<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game iPad</title>

<style>
body{
    margin:0;
    background:#0f172a;
    display:flex;
    flex-direction:column;
    align-items:center;
    color:white;
    font-family:Arial;
}

h1{
    margin:10px;
    color:#00ffff;
}

canvas{
    background:black;
    border:3px solid #00ffff;
    border-radius:10px;
}

#score{
    margin:10px;
    font-size:20px;
}
</style>
</head>

<body>

<h1>🐍 Snake Game</h1>
<div id="score">Score: 0</div>

<canvas id="game" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 20;

let snake = [{x:10,y:10}];
let dx = 1;
let dy = 0;

let food = spawnFood();
let score = 0;

function spawnFood(){
    return {
        x: Math.floor(Math.random() * (canvas.width / grid)),
        y: Math.floor(Math.random() * (canvas.height / grid))
    };
}document.addEventListener("keydown", (e) => {

    if(e.key === "ArrowUp" && dy === 0){
        dx = 0; dy = -1;
    }

    if(e.key === "ArrowDown" && dy === 0){
        dx = 0; dy = 1;
    }

    if(e.key === "ArrowLeft" && dx === 0){
        dx = -1; dy = 0;
    }

    if(e.key === "ArrowRight" && dx === 0){
        dx = 1; dy = 0;
    }
});function update(){

    let head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
    };

    // ชนขอบ
    if(head.x < 0 || head.y < 0 ||
       head.x >= canvas.width / grid ||
       head.y >= canvas.height / grid){
        alert("Game Over");
        location.reload();
    }

    // ชนตัวเอง
    for(let part of snake){
        if(part.x === head.x && part.y === head.y){
            alert("Game Over");
            location.reload();
        }
    }

    snake.unshift(head);

    // กินอาหาร
    if(head.x === food.x && head.y === food.y){
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        food = spawnFood();
    }else{
        snake.pop();
    }
}function draw(){

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // food
    ctx.fillStyle = "red";
    ctx.fillRect(food.x*grid, food.y*grid, grid, grid);

    // snake
    ctx.fillStyle = "lime";
    for(let part of snake){
        ctx.fillRect(part.x*grid, part.y*grid, grid, grid);
    }
}function gameLoop(){
    update();
    draw();
}

setInterval(gameLoop, 100);
</script>
</body>
</html>
