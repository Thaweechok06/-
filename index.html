<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แนะนำตัว กิต56</title>

    <style>
        body {
            font-family: Tahoma, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 700px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #4facfe;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        .info {
            text-align: left;
            margin-top: 20px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            background: #4facfe;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #008cff;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/180" alt="รูปโปรไฟล์">

        <h1>สวัสดีครับ ผม กิต56</h1>

        <p>ยินดีต้อนรับสู่เว็บไซต์แนะนำตัวของผม</p>

        <div class="info">
            <h3>ข้อมูลส่วนตัว</h3>
            <p><strong>ชื่อ:</strong> กิต56</p>
            <p><strong>งานอดิเรก:</strong> เล่นเกม, เขียนโค้ด, ฟังเพลง</p>
            <p><strong>ความสนใจ:</strong> เทคโนโลยี และการพัฒนาเว็บไซต์</p>
        </div>

        <a href="#" class="btn">ติดต่อฉัน</a>
    </div>

</body>
</html>
