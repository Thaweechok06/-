<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Hell Shooter 2D</title>
<style>
html,body{
margin:0;
padding:0;
background:#000;
overflow:hidden;
font-family:monospace;
}
canvas{
display:block;
background:#0a0a0a;
}
#hud{
position:fixed;
top:10px;
left:10px;
color:#0f0;
font-size:14px;
}
</style>
</head>

<body>
<canvas id="game"></canvas>
<div id="hud"></div>

<script>
/* =========================
   HELL SHOOTER 2D
   ระบบเกมยิงแบบเอาชีวิตรอด
   ========================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

/* =========================
   INPUT SYSTEM
========================= */

const keys = {};
let mouse = {x:0,y:0,down:false};

window.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()] = false);

window.addEventListener("mousemove",(e)=>{
mouse.x = e.clientX;
mouse.y = e.clientY;
});

window.addEventListener("mousedown",()=>mouse.down = true);
window.addEventListener("mouseup",()=>mouse.down = false);

/* =========================
   UTILITY
========================= */

function dist(a,b){
return Math.hypot(a.x-b.x,a.y-b.y);
}

function rand(min,max){
return Math.random()*(max-min)+min;
}

/* =========================
   PLAYER
========================= */

class Player{
constructor(){
this.x = canvas.width/2;
this.y = canvas.height/2;
this.size = 18;
this.speed = 3.2;
this.hp = 100;
this.angle = 0;
this.fireRate = 0;
}

update(){
if(keys["w"]) this.y -= this.speed;
if(keys["s"]) this.y += this.speed;
if(keys["a"]) this.x -= this.speed;
if(keys["d"]) this.x += this.speed;

this.angle = Math.atan2(mouse.y-this.y,mouse.x-this.x);

if(this.fireRate > 0) this.fireRate--;

if(mouse.down && this.fireRate <= 0){
bullets.push(new Bullet(this.x,this.y,this.angle));
this.fireRate = 10;
}

/* กันหลุดจอ */
this.x = Math.max(0,Math.min(canvas.width,this.x));
this.y = Math.max(0,Math.min(canvas.height,this.y));
}

draw(){
ctx.save();
ctx.translate(this.x,this.y);
ctx.rotate(this.angle);

/* ตัวผู้เล่น */
ctx.fillStyle="#00ffcc";
ctx.fillRect(-10,-10,20,20);

/* ปืน */
ctx.fillStyle="#fff";
ctx.fillRect(0,-3,18,6);

ctx.restore();
}
}

/* =========================
   BULLET
========================= */

class Bullet{
constructor(x,y,a){
this.x=x;
this.y=y;
this.a=a;
this.speed=7;
this.life=60;
}

update(){
this.x += Math.cos(this.a)*this.speed;
this.y += Math.sin(this.a)*this.speed;
this.life--;
}

draw(){
ctx.fillStyle="#ff0";
ctx.fillRect(this.x,this.y,4,4);
}
}

/* =========================
   ENEMY
========================= */

class Enemy{
constructor(){
this.x = rand(0,canvas.width);
this.y = rand(0,canvas.height);
this.size = 16;
this.hp = 30;
this.speed = rand(1,2.2);
}

update(){
let a = Math.atan2(player.y-this.y,player.x-this.x);
this.x += Math.cos(a)*this.speed;
this.y += Math.sin(a)*this.speed;
}

draw(){
ctx.fillStyle="#ff0044";
ctx.fillRect(this.x-10,this.y-10,20,20);
}
}

/* =========================
   PARTICLE
========================= */

class Particle{
constructor(x,y){
this.x=x;
this.y=y;
this.vx=rand(-2,2);
this.vy=rand(-2,2);
this.life=30;
}

update(){
this.x += this.vx;
this.y += this.vy;
this.life--;
}

draw(){
ctx.fillStyle="orange";
ctx.fillRect(this.x,this.y,3,3);
}
}

/* =========================
   GAME STATE
========================= */

const player = new Player();
const bullets = [];
const enemies = [];
const particles = [];

let wave = 1;
let spawnTimer = 0;

/* =========================
   SPAWN ENEMY
========================= */

function spawnEnemy(){
for(let i=0;i<wave;i++){
enemies.push(new Enemy());
}
}

/* =========================
   COLLISION
========================= */

function checkHit(){
for(let i=bullets.length-1;i>=0;i--){
for(let j=enemies.length-1;j>=0;j--){
let b = bullets[i];
let e = enemies[j];

if(!b || !e) continue;

if(Math.abs(b.x-e.x)<15 && Math.abs(b.y-e.y)<15){

for(let k=0;k<8;k++){
particles.push(new Particle(e.x,e.y));
}

e.hp -= 10;
bullets.splice(i,1);

if(e.hp <= 0){
enemies.splice(j,1);
}

break;
}
}
}
}

/* =========================
   PLAYER DAMAGE
========================= */

function enemyHitPlayer(){
enemies.forEach(e=>{
if(Math.abs(e.x-player.x)<18 && Math.abs(e.y-player.y)<18){
player.hp -= 0.5;
}
});
}

/* =========================
   GAME LOOP
========================= */

function update(){

player.update();

/* bullets */
for(let i=bullets.length-1;i>=0;i--){
bullets[i].update();
if(bullets[i].life<=0) bullets.splice(i,1);
}

/* enemies */
enemies.forEach(e=>e.update());

/* particles */
for(let i=particles.length-1;i>=0;i--){
particles[i].update();
if(particles[i].life<=0) particles.splice(i,1);
}

/* collisions */
checkHit();
enemyHitPlayer();

/* wave system */
if(enemies.length===0){
wave++;
spawnEnemy();
}

/* HUD */
hud.innerHTML = `
HP: ${player.hp.toFixed(0)}<br>
Wave: ${wave}<br>
Enemies: ${enemies.length}
`;

/* game over */
if(player.hp <= 0){
alert("GAME OVER");
location.reload();
}
}

/* =========================
   DRAW
========================= */

function draw(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

player.draw();

bullets.forEach(b=>b.draw());
enemies.forEach(e=>e.draw());
particles.forEach(p=>p.draw());
}

/* =========================
   LOOP
========================= */

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

/* start */
spawnEnemy();
loop();

</script>
</body>
</html>
