<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>iStyle Web App</title>

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
background:#f5f5f7;
color:#1d1d1f;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 40px;
background:rgba(255,255,255,0.8);
backdrop-filter: blur(10px);
position:fixed;
width:100%;
top:0;
}

nav .logo{
font-weight:bold;
font-size:20px;
}

nav a{
margin:0 12px;
text-decoration:none;
color:#333;
font-size:14px;
}

nav a:hover{
color:#000;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(to bottom,#fff,#eaeaea);
}

.hero h1{
font-size:60px;
margin:0;
}

.hero p{
font-size:20px;
color:#555;
}

.btn{
margin-top:20px;
padding:12px 24px;
border-radius:30px;
border:none;
background:#0071e3;
color:white;
cursor:pointer;
font-size:16px;
}

.btn:hover{
background:#005bb5;
}

/* PRODUCT GRID */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:60px;
background:#fff;
}

.card{
background:#f9f9f9;
border-radius:20px;
padding:20px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
background:#fff;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.card img{
width:120px;
}

footer{
text-align:center;
padding:20px;
font-size:12px;
color:#888;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div class="logo">🍎 iStyle</div>
<div>
<a href="#">Mac</a>
<a href="#">iPhone</a>
<a href="#">iPad</a>
<a href="#">Watch</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Think Different.</h1>
<p>Experience technology in a simple, beautiful way.</p>
<button class="btn" onclick="alert('Welcome to iStyle!')">
Explore
</button>
</section>

<!-- PRODUCTS -->
<section class="products">

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
<h3>MacBook Pro</h3>
<p>Power. Moves fast.</p>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
<h3>iPhone 15</h3>
<p>Pro camera. Pro performance.</p>
</div>

<div class="card">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
<h3>iPad Air</h3>
<p>Light. Powerful. Magical.</p>
</div>

</section>

<footer>
© 2026 iStyle Web App Inspired by :contentReference[oaicite:0]{index=0}
</footer>

</body>
</html>
