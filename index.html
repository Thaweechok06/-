<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sling Shot Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:#1b1b1b;
font-family:Arial;
}

canvas{
display:block;
}

#ui{
position:fixed;
top:10px;
left:10px;
color:#0f0;
font-size:14px;
}
</style>
</head>

<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");
const ui=document.getElementById("ui");

c.width=innerWidth;
c.height=innerHeight;

/* =========================
   PHYSICS SETTINGS
========================= */

let gravity=0.4;

/* mouse */
let mouse={
x:0,
y:0,
down:false
};

addEventListener("mousemove",(e)=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
});

addEventListener("mousedown",()=>mouse.down=true);
addEventListener("mouseup",()=>mouse.down=false);

/* =========================
   SLING POINT
========================= */

let sling={
x:150,
y:c.height-150
};

/* =========================
   BALL
========================= */

class Ball{
constructor(){
this.x=sling.x;
this.y=sling.y;
this.r=10;

this.vx=0;
this.vy=0;

this.launched=false;
}

update(){

if(!this.launched && mouse.down){
this.x=mouse.x;
this.y=mouse.y;
}

if(!mouse.down && !this.launched){
this.vx=(sling.x-this.x)*0.2;
this.vy=(sling.y-this.y)*0.2;
this.launched=true;
}

if(this.launched){
this.vy+=gravity;

this.x+=this.vx;
this.y+=this.vy;
}

/* reset if out */
if(this.y>c.height || this.x>c.width){
resetBall();
}
}

draw(){
ctx.fillStyle="orange";
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fill();
}
}

/* =========================
   BLOCKS (TARGET)
========================= */

class Block{
constructor(x,y){
this.x=x;
this.y=y;
this.w=40;
this.h=40;
this.hp=3;
}

draw(){
ctx.fillStyle="brown";
ctx.fillRect(this.x,this.y,this.w,this.h);
}
}

/* =========================
   GAME OBJECTS
========================= */

let ball=new Ball();
let blocks=[];
let score=0;

/* create blocks */
function createLevel(){
blocks=[];
for(let i=0;i<6;i++){
blocks.push(new Block(600+i*45,c.height-60));
}
for(let i=0;i<3;i++){
blocks.push(new Block(650+i*45,c.height-100));
}
}

createLevel();

/* =========================
   RESET BALL
========================= */

function resetBall(){
ball=new Ball();
}

/* =========================
   COLLISION
========================= */

function collision(){

blocks.forEach((b,i)=>{
if(
ball.x>b.x &&
ball.x<b.x+b.w &&
ball.y>b.y &&
ball.y<b.y+b.h
){
b.hp--;
ball.vx*=-0.6;
ball.vy*=-0.6;

if(b.hp<=0){
blocks.splice(i,1);
score+=10;
}
}
});
}

/* =========================
   DRAW SLING
========================= */

function drawSling(){
if(!ball.launched && mouse.down){
ctx.strokeStyle="#fff";
ctx.beginPath();
ctx.moveTo(sling.x,sling.y);
ctx.lineTo(mouse.x,mouse.y);
ctx.stroke();
}

ctx.fillStyle="white";
ctx.fillRect(sling.x-5,sling.y-5,10,10);
}

/* =========================
   LOOP
========================= */

function update(){
ball.update();
collision();

ui.innerHTML=
"Score: "+score+
"<br>Blocks: "+blocks.length;
}

function draw(){
ctx.fillStyle="#1b1b1b";
ctx.fillRect(0,0,c.width,c.height);

drawSling();

ball.draw();

blocks.forEach(b=>b.draw());
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
