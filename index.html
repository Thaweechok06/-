<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Shooter UI Game</title>

<style>
body{
margin:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

canvas{
display:block;
}

/* HUD */
#hud{
position:fixed;
top:10px;
left:10px;
color:#0f0;
font-size:14px;
}

/* CONTROL BUTTONS */
.btn{
position:fixed;
width:60px;
height:60px;
border-radius:50%;
background:rgba(255,255,255,0.15);
border:2px solid white;
color:white;
text-align:center;
line-height:60px;
user-select:none;
}

.btn:active{
background:rgba(255,255,255,0.4);
}

/* positions */
#up{bottom:140px;left:80px;}
#down{bottom:20px;left:80px;}
#left{bottom:80px;left:20px;}
#right{bottom:80px;left:140px;}

#shoot{right:40px;bottom:80px;}
#reload{right:120px;bottom:40px;}
#switch{right:120px;bottom:120px;}
#jump{right:40px;bottom:160px;}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="hud"></div>

<!-- CONTROL BUTTONS -->
<div id="up" class="btn">▲</div>
<div id="down" class="btn">▼</div>
<div id="left" class="btn">◀</div>
<div id="right" class="btn">▶</div>

<div id="shoot" class="btn">FIRE</div>
<div id="reload" class="btn">R</div>
<div id="switch" class="btn">SW</div>
<div id="jump" class="btn">JUMP</div>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");
const hud=document.getElementById("hud");

c.width=innerWidth;
c.height=innerHeight;

/* INPUT STATE */
let key={};

/* BUTTON CONTROL */
function hold(id,keyName){
let el=document.getElementById(id);

el.addEventListener("mousedown",()=>key[keyName]=true);
el.addEventListener("mouseup",()=>key[keyName]=false);
el.addEventListener("mouseleave",()=>key[keyName]=false);

el.addEventListener("touchstart",()=>key[keyName]=true);
el.addEventListener("touchend",()=>key[keyName]=false);
}

hold("up","w");
hold("down","s");
hold("left","a");
hold("right","d");

/* actions */
let shoot=false;
let reload=false;
let switchGun=false;
let jump=false;

function action(id,ref){
let el=document.getElementById(id);
el.addEventListener("mousedown",()=>ref.state=true);
el.addEventListener("mouseup",()=>ref.state=false);
el.addEventListener("touchstart",()=>ref.state=true);
el.addEventListener("touchend",()=>ref.state=false);
}

let shootBtn={state:false};
let reloadBtn={state:false};
let switchBtn={state:false};
let jumpBtn={state:false};

action("shoot",shootBtn);
action("reload",reloadBtn);
action("switch",switchBtn);
action("jump",jumpBtn);

/* GAME OBJECTS */
class Player{
constructor(){
this.x=200;
this.y=200;
this.hp=100;
this.sp=3;

this.guns=[
{ name:"PISTOL", ammo:12, max:12 },
{ name:"RIFLE", ammo:30, max:30 }
];

this.gun=0;
this.cool=0;
}

update(){

if(key["w"]) this.y-=this.sp;
if(key["s"]) this.y+=this.sp;
if(key["a"]) this.x-=this.sp;
if(key["d"]) this.x+=this.sp;

/* shoot */
if(shootBtn.state && this.cool<=0){
let g=this.guns[this.gun];
if(g.ammo>0){
bullets.push(new Bullet(this.x,this.y));
g.ammo--;
this.cool=10;
}
}

/* reload */
if(reloadBtn.state){
let g=this.guns[this.gun];
g.ammo=g.max;
reloadBtn.state=false;
}

/* switch gun */
if(switchBtn.state){
this.gun=(this.gun+1)%this.guns.length;
switchBtn.state=false;
}

/* jump */
if(jumpBtn.state){
this.y-=20;
jumpBtn.state=false;
}

if(this.cool>0) this.cool--;
}

draw(){
ctx.fillStyle="#00ffd5";
ctx.fillRect(this.x,this.y,20,20);
}
}

class Bullet{
constructor(x,y){
this.x=x;
this.y=y;
this.sp=6;
this.life=60;
}

update(){
this.x+=this.sp;
this.life--;
}

draw(){
ctx.fillStyle="yellow";
ctx.fillRect(this.x,this.y,5,3);
}
}

class Enemy{
constructor(){
this.x=Math.random()*c.width;
this.y=Math.random()*c.height;
this.hp=30;
this.sp=1.2;
}

update(){
this.x-=this.sp;
}

draw(){
ctx.fillStyle="red";
ctx.fillRect(this.x,this.y,20,20);
}
}

/* GAME */
let player=new Player();
let bullets=[];
let enemies=[];

/* spawn */
setInterval(()=>{
enemies.push(new Enemy());
},1500);

/* collision */
function hit(){
for(let i=bullets.length-1;i>=0;i--){
for(let j=enemies.length-1;j>=0;j--){
let b=bullets[i];
let e=enemies[j];

if(Math.abs(b.x-e.x)<15){
e.hp-=10;
bullets.splice(i,1);

if(e.hp<=0){
enemies.splice(j,1);
}
break;
}
}
}
}

function update(){
player.update();

bullets.forEach(b=>b.update());
bullets=bullets.filter(b=>b.life>0);

enemies.forEach(e=>e.update());

hit();

/* HUD */
hud.innerHTML=`
HP: ${player.hp}<br>
Weapon: ${player.guns[player.gun].name}<br>
Ammo: ${player.guns[player.gun].ammo}
`;
}

function draw(){
ctx.fillStyle="#111";
ctx.fillRect(0,0,c.width,c.height);

player.draw();
bullets.forEach(b=>b.draw());
enemies.forEach(e=>e.draw());
}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
