<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#1e1e1e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    background:#2d2d2d;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    width:320px;
}

#display{
    width:100%;
    height:70px;
    border:none;
    border-radius:10px;
    font-size:2rem;
    text-align:right;
    padding:10px;
    margin-bottom:15px;
    background:#111;
    color:white;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:10px;
    font-size:1.3rem;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    opacity:0.85;
}

.number{
    background:#444;
    color:white;
}

.operator{
    background:#ff9500;
    color:white;
}

.clear{
    background:#ff3b30;
    color:white;
}

.equal{
    background:#34c759;
    color:white;
}
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('/')">÷</button>
        <button class="operator" onclick="append('*')">×</button>
        <button class="operator" onclick="append('-')">−</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="equal" onclick="calculate()" rowspan="2">=</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>

        <button class="number" onclick="append('0')">0</button>
        <button class="number" onclick="append('.')">.</button>
        <button class="number" onclick="backspace()">⌫</button>
    </div>
</div>

<script>
const display = document.getElementById("display");

function append(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function backspace(){
    display.value = display.value.slice(0,-1);
}

function calculate(){
    try{
        display.value = eval(display.value);
    }catch{
        display.value = "Error";
    }
}

document.addEventListener("keydown",(e)=>{
    const allowed = "0123456789+-*/.";

    if(allowed.includes(e.key)){
        append(e.key);
    }

    if(e.key === "Enter"){
        calculate();
    }

    if(e.key === "Backspace"){
        backspace();
    }

    if(e.key === "Escape"){
        clearDisplay();
    }
});
</script>

</body>
</html>
